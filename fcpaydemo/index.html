<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FC Pay JPYC Payment Demo</title>
<style>
*{box-sizing:border-box}
:root{--navy:#071735;--ink:#17243b;--muted:#65758f;--blue:#0b5bc7;--cyan:#08a9e8;--green:#12884e;--amber:#d89213;--line:#c8d8ea;--soft-blue:#eaf4ff;--shadow:0 20px 46px rgba(15,37,75,.15)}
html,body{height:100%}
body{margin:0;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Meiryo",Arial,sans-serif;background:linear-gradient(180deg,#f8fbff 0%,#edf4fb 100%)}
button{font:inherit;cursor:pointer}
.window{min-height:100%;display:grid;grid-template-rows:auto 1fr}
.top{display:flex;justify-content:space-between;gap:20px;align-items:flex-start;padding:20px 26px 14px;border-bottom:1px solid #dce7f4;background:rgba(255,255,255,.78)}
.top-main{max-width:790px}
h1{margin:0;color:var(--navy);font-size:clamp(24px,3vw,40px);line-height:1.12;font-weight:900;letter-spacing:0}
.top p{margin:8px 0 0;color:#263f66;font-size:14px;font-weight:800;line-height:1.5}
.top-tools{display:grid;gap:10px;justify-items:end}
.languageToggle{display:inline-flex;gap:4px;padding:4px;border:1px solid var(--line);border-radius:9px;background:#fff}
.languageToggle button{border:0;border-radius:7px;background:transparent;color:#344b69;font-size:12px;font-weight:900;min-height:30px;padding:0 10px}
.languageToggle button.active{background:var(--blue);color:#fff}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end;max-width:520px}
.chip{display:inline-flex;align-items:center;gap:7px;min-height:32px;padding:6px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:#283d5d;font-size:12px;font-weight:900}
.chip i{width:14px;height:14px;border-radius:4px;background:var(--blue);display:block}
.chip.wallet i{background:var(--amber)}.chip.chain i{background:var(--green)}
.workspace{width:100%;max-width:1540px;margin:0 auto;padding:18px 20px 22px;display:grid;grid-template-columns:300px minmax(420px,1fr) 430px;gap:14px}
.panel{background:rgba(255,255,255,.95);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);overflow:hidden}
.panel-head{padding:14px 15px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#fff,#f7fbff)}
.panel-head h2{margin:0;color:var(--navy);font-size:16px}.panel-head p{margin:5px 0 0;color:var(--muted);font-size:12px;font-weight:700;line-height:1.45}
.steps{display:grid;gap:8px;padding:12px}
.step{border:1px solid var(--line);border-radius:8px;background:white;padding:10px;display:grid;grid-template-columns:32px 1fr;gap:10px;align-items:center;text-align:left}
.step.active{border-color:var(--blue);background:var(--soft-blue);box-shadow:inset 4px 0 0 var(--blue)}.step.done{border-color:#99d5b5;background:#f7fcf9}
.num{width:30px;height:30px;border-radius:50%;background:#e6eef8;color:#2d4868;font-size:13px;font-weight:900;display:grid;place-items:center}.active .num{background:var(--blue);color:#fff}.done .num{background:var(--green);color:#fff}
.step b{font-size:13px;color:var(--navy);display:block;line-height:1.25;white-space:pre-line}.step span span{display:block;margin-top:4px;font-size:11px;color:var(--muted);font-weight:800;line-height:1.3}
.side-controls{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px;border-top:1px solid var(--line);background:#fbfdff}
.btn{min-height:40px;border:1px solid #9dbce6;border-radius:7px;background:white;color:#143d78;font-weight:900}.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}.btn.green{background:var(--green);border-color:var(--green);color:#fff}.btn:disabled{opacity:.48;cursor:not-allowed}
.phone-zone{display:grid;grid-template-rows:auto 1fr auto;min-height:760px}
.stage-head{padding:14px 17px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#fff,#f8fbff)}.stage-head h2{margin:0;color:var(--navy);font-size:21px;line-height:1.28;white-space:pre-line}.stage-head p{margin:6px 0 0;color:var(--muted);font-size:13px;font-weight:800;line-height:1.5}
.phone-wrap{display:grid;place-items:center;padding:22px;background:linear-gradient(90deg,rgba(11,91,199,.07),transparent 30%,transparent 70%,rgba(18,136,78,.06)),#fbfdff}
.phoneViewport{width:360px;max-width:100%;height:690px;background:#111827;border-radius:42px;padding:13px;box-shadow:0 26px 64px rgba(9,22,46,.28);position:relative}
.phoneViewport:before{content:"";position:absolute;top:18px;left:50%;width:96px;height:24px;background:#111827;border-radius:0 0 16px 16px;transform:translateX(-50%);z-index:3}
.phone-screen{height:100%;border-radius:32px;background:#f6f9fe;overflow:hidden;display:grid;grid-template-rows:auto 1fr auto;position:relative}
.phone-status{height:34px;padding:9px 18px 0;display:flex;justify-content:space-between;color:#0f1c32;font-size:12px;font-weight:900}
.phone-app{padding:14px;display:grid;align-content:start;gap:12px;overflow:auto}
.app-card{border:1px solid #c8d8ea;border-radius:16px;background:#fff;padding:14px;box-shadow:0 8px 18px rgba(18,41,78,.07)}
.brand{display:flex;align-items:center;gap:10px}.mark{width:42px;height:42px;border-radius:12px;background:var(--cyan);color:white;font-weight:900;display:grid;place-items:center}.brand h3{margin:0;color:var(--navy);font-size:17px}.brand p{margin:3px 0 0;color:var(--muted);font-size:11px;font-weight:800}
.hero-ticket{background:linear-gradient(135deg,#0b5bc7,#08a9e8);color:white;border-radius:16px;padding:16px}.hero-ticket b{display:block;font-size:17px;margin-bottom:5px}.hero-ticket span{display:block;font-size:12px;font-weight:800;opacity:.92;line-height:1.5}
.kv{display:grid;gap:7px}.kv div{display:flex;justify-content:space-between;gap:10px;font-size:12px;border-bottom:1px solid #edf2f8;padding-bottom:7px}.kv div:last-child{border-bottom:0;padding-bottom:0}.kv span{color:var(--muted);font-weight:900}.kv b{color:var(--navy);text-align:right}
.phone-btn{width:100%;min-height:46px;border:0;border-radius:13px;background:var(--blue);color:#fff;font-weight:900}.phone-btn.secondary{background:white;color:var(--blue);border:1px solid #9dbce6}.phone-btn.green{background:var(--green)}.phone-btn.amber{background:var(--amber)}
.phone-nav{height:32px;display:grid;place-items:center}.home-indicator{width:112px;height:5px;border-radius:6px;background:#111827;opacity:.9}
.wallet-top{background:linear-gradient(135deg,#fff5dc,#ffffff);border:1px solid #efd394}.wallet-logo{width:46px;height:46px;border-radius:13px;border:3px solid var(--blue);position:relative}.wallet-logo:after{content:"";position:absolute;inset:10px;border:3px solid #66a8ff;border-radius:8px;transform:rotate(45deg)}
.amount{font-size:32px;color:var(--navy);font-weight:900;text-align:center;margin:4px 0}.confirm-box{border:1px solid #efd394;background:#fffaf0;border-radius:14px;padding:12px;display:grid;gap:7px}.loader{height:9px;background:#e5edf7;border-radius:999px;overflow:hidden}.loader span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:999px;transition:width .25s ease}.chainProcessing{display:grid;justify-items:center;gap:12px;text-align:center}.chainProcessing-icon{width:76px;height:76px;border-radius:50%;border:8px solid #dce9f7;border-top-color:var(--green);animation:spin 1s linear infinite}.chainProcessing h4{margin:0;color:var(--navy);font-size:16px}.chainProcessing p{margin:0;color:#39506e;font-size:12px;font-weight:800;line-height:1.5}.processing-bar{height:9px;width:100%;background:#e5edf7;border-radius:999px;overflow:hidden}.processing-bar span{display:block;height:100%;width:100%;background:linear-gradient(90deg,var(--blue),var(--green));animation:fillProcessing 1s ease-in-out forwards}@keyframes spin{to{transform:rotate(360deg)}}@keyframes fillProcessing{from{transform:translateX(-100%)}to{transform:translateX(0)}}.toast-line{font-size:12px;color:#39506e;font-weight:800;line-height:1.5}
.pc{display:grid;grid-template-rows:auto auto 1fr auto;min-height:760px}.browserPanel{padding:12px;display:grid;gap:12px}.browser-shell{border:1px solid var(--line);border-radius:8px;background:#fff;overflow:hidden}.browser-bar{height:34px;background:#edf3fa;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:7px;padding:0 10px}.browser-dot{width:9px;height:9px;border-radius:50%;background:#c7d5e7}.browser-url{height:20px;flex:1;border-radius:999px;background:#fff;color:#62738c;font-size:11px;font-weight:800;display:flex;align-items:center;padding:0 10px;overflow:hidden;white-space:nowrap}.browser-body{padding:12px}.browser-body h3{margin:0 0 8px;color:var(--navy);font-size:14px}
.rows{display:grid;gap:0;border:1px solid #e4edf7;border-radius:8px;overflow:hidden}.row{display:flex;justify-content:space-between;gap:10px;padding:9px 10px;border-bottom:1px solid #e4edf7;font-size:12px}.row:last-child{border-bottom:0}.row span{color:var(--muted);font-weight:900}.row b{color:var(--navy);text-align:right}
pre{margin:0;border:1px solid #dbe7f4;background:#071735;color:#e7f0ff;border-radius:8px;padding:11px;max-height:270px;overflow:auto;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:11px;line-height:1.5}
.log{padding:12px;border-top:1px solid var(--line);background:#fbfdff}.log h3{margin:0 0 8px;color:var(--navy);font-size:13px}#eventLog{min-height:120px;white-space:pre-wrap}.floating-toast{position:fixed;right:20px;bottom:20px;background:#071735;color:white;border-radius:8px;padding:12px 14px;font-size:13px;font-weight:900;box-shadow:0 14px 32px rgba(5,18,45,.28);opacity:0;transform:translateY(12px);transition:.2s ease;max-width:360px;line-height:1.45}.floating-toast.show{opacity:1;transform:translateY(0)}
@media(max-width:1180px){.workspace{grid-template-columns:270px 1fr}.pc{grid-column:1/-1;min-height:auto}}
@media(max-width:760px){.top{display:block;padding:18px 14px}.top-tools{justify-items:start;margin-top:12px}.chips{justify-content:flex-start}.workspace{grid-template-columns:1fr;padding:12px}.phone-zone,.pc{min-height:auto}.phoneViewport{height:650px}}
</style>
</head>
<body>
<div class="window">
  <header class="top">
    <div class="top-main">
      <h1 id="heroTitle"></h1>
      <p id="heroLead"></p>
    </div>
    <div class="top-tools">
      <div class="languageToggle" id="languageToggle" aria-label="Language">
        <button type="button" data-lang="ja" class="active">日本語</button>
        <button type="button" data-lang="en">English</button>
      </div>
      <div class="chips">
        <span class="chip"><i></i>FC Pay App</span>
        <span class="chip wallet"><i></i>HashPort Wallet</span>
        <span class="chip chain"><i></i>JPYC / Avalanche</span>
      </div>
    </div>
  </header>
  <main class="workspace">
    <aside class="panel">
      <div class="panel-head"><h2 id="stepsTitle"></h2><p id="stepsLead"></p></div>
      <div class="steps" id="steps"></div>
      <div class="side-controls">
        <button class="btn" id="prevBtn" type="button"></button>
        <button class="btn primary" id="nextBtn" type="button"></button>
        <button class="btn" id="resetBtn" type="button"></button>
        <button class="btn green" id="autoBtn" type="button"></button>
      </div>
    </aside>
    <section class="panel phone-zone">
      <div class="stage-head"><h2 id="stageTitle"></h2><p id="stageLead"></p></div>
      <div class="phone-wrap">
        <div class="phoneViewport" id="phoneViewport">
          <div class="phone-screen">
            <div class="phone-status"><span>9:41</span><span id="phoneAppName">FC Pay</span></div>
            <div class="phone-app" id="phoneApp"></div>
            <div class="phone-nav"><div class="home-indicator"></div></div>
          </div>
        </div>
      </div>
      <div class="log"><h3 id="logTitle"></h3><pre id="eventLog"></pre></div>
    </section>
    <aside class="panel pc">
      <div class="panel-head"><h2 id="pcTitle"></h2><p id="pcLead"></p></div>
      <div class="browserPanel" id="browserPanel">
        <div class="browser-shell">
          <div class="browser-bar"><span class="browser-dot"></span><span class="browser-dot"></span><span class="browser-dot"></span><div class="browser-url">https://fc-pay.example/admin/payment-monitor</div></div>
          <div class="browser-body"><h3>Payment Monitor</h3><div class="rows" id="statusRows"></div></div>
        </div>
        <pre id="requestJson"></pre>
      </div>
      <div class="side-controls">
        <button class="btn primary" id="copyTxBtn" type="button"></button>
        <button class="btn" id="openFcBtn" type="button"></button>
      </div>
    </aside>
  </main>
</div>
<div class="floating-toast" id="toast" role="status"></div>
<script>
const txHash = "0x8b7e...JPYC...42a1";
const walletAddress = "0xHPW9...91D8";
const merchantAddress = "0xFCPay...Vault";
const paymentRequest = {requestId:"PAY-20240620-0001",orderId:"ORD-20240620-001",item:"FC Pay sample order",amount:"12000",currency:"JPYC",network:"Avalanche",tokenStandard:"ERC-20",fromWallet:null,toMerchantWallet:merchantAddress,callbackUrl:"https://fc-pay.example/webhook/jpyc",walletConnectSession:null,signedPayload:null,txHash:null,status:"draft"};

const i18n = {
  ja: {
    pageTitle:"FC Pay JPYC支払いデモ",
    heroTitle:"FC PayでJPYC支払いを体験",
    heroLead:"スマホ画面の中で、FC PayからHashPort Walletを呼び出し、Avalanche上のJPYC支払いリクエストの確認、HashPort Walletで署名、JPYC Transfer、Txブロードキャスト、Webhook確認まで操作できます。",
    stepsTitle:"ユーザー操作",
    stepsLead:"左の手順でも、スマホ内のボタンでも操作できます。",
    pcTitle:"PC補助画面",
    pcLead:"browserPanel: paymentRequest、WalletConnect Session、Tx、Webhook状態を確認する補助ビューです。",
    logTitle:"スマホ操作ログ",
    prev:"戻る", next:"次へ", reset:"リセット", auto:"自動再生", stop:"停止", copyTx:"Txをコピー", openFc:"FC Payに戻る",
    fcSubtitle:"ファン向け決済チェックアウト",
    walletSubtitle:"WalletConnect Session",
    orderTitle:"FC Pay サンプル注文",
    paidTitle:"支払い完了",
    orderMeta:"注文 ORD-20240620-001<br>金額 12,000 JPYC",
    connect:"HashPort Walletに接続",
    pay:"JPYCで支払う",
    openWallet:"HashPort Walletを開く",
    approve:"承認して署名",
    broadcast:"JPYC Transferを送信",
    webhook:"Webhook確認をシミュレート",
    copied:"Tx情報をコピーしました",
    noTx:"Txはまだ送信されていません",
    paidBody:"Webhook確認が完了し、FC Payの注文ステータスが paid に更新されました。",
    walletDone:"HashPort Walletで支払い完了が表示されています。",
    waitingWebhook:"Txブロードキャスト完了。チェーン確認とWebhookを待っています。",
    processingTitle:"ブロックチェーン上で処理中",
    processingBody:"JPYC TransferをAvalancheへ送信しています。約1.5秒後にTx確認へ進みます。",
    processingLog:"Blockchain processing animation is shown for 1.5 seconds.",
    labels:{wallet:"Wallet",network:"ネットワーク",token:"トークン",status:"ステータス",to:"送金先",gas:"Gas見積",request:"リクエスト",order:"注文",session:"Session",tx:"Tx Hash"},
    rows:{order:"Order",wallet:"Wallet",session:"Session",status:"Status",tx:"Tx Hash"},
    steps:[
      ["FC Payを開く","FC Pay App","ユーザーがスマホでFC Payを開き、支払い待ちの注文を確認します。","User opens FC Pay checkout."],
      ["HashPort Walletに接続して\nJPYCで支払う","WalletConnect Session","ユーザーが接続ボタンを押すと、FC PayがHashPort Walletを呼び出し、同時にAvalanche上のJPYC支払いリクエストを作成します。","FC Pay -> WalletConnect Session -> HashPort Wallet; pay with JPYC."],
      ["Walletで支払い内容を確認","HashPort Wallet","スマホ画面がHashPort Walletに切り替わり、金額・送金先・ネットワーク・Gas見積を確認します。","HashPort Wallet shows amount, recipient, network and gas estimate."],
      ["HashPort Walletで署名","User / Wallet","ユーザーがHashPort Walletで署名し、送信可能なJPYC Transferを作成します。","HashPort Wallet -> simulateWalletSignature(paymentRequest)."],
      ["Txブロードキャスト","Avalanche","署名済みのJPYC TransferをAvalancheへブロードキャストし、Tx Hashを取得します。",`JPYC Transfer broadcasted. Tx Hash: ${txHash}`],
      ["Webhook確認","FC Pay Backend","支払い基盤がチェーン上の確定を検知し、WebhookでFC Payへ通知します。注文は paid になります。","Webhook confirms payment. FC Pay order status becomes paid."]
    ]
  },
  en: {
    pageTitle:"FC Pay JPYC Payment Demo",
    heroTitle:"Operate like a real user in FC Pay",
    heroLead:"Use the phone screen to call HashPort Wallet from FC Pay, review an Avalanche JPYC payment request, sign in HashPort Wallet, send the JPYC Transfer, broadcast the Tx, and receive Webhook confirmation.",
    stepsTitle:"User Actions",
    stepsLead:"Use the side steps or tap the buttons inside the phone.",
    pcTitle:"PC Support View",
    pcLead:"browserPanel: a helper view for paymentRequest, WalletConnect Session, Tx, and Webhook status.",
    logTitle:"Phone Action Log",
    prev:"Back", next:"Next", reset:"Reset", auto:"Auto Play", stop:"Stop", copyTx:"Copy Tx", openFc:"Back to FC Pay",
    fcSubtitle:"Fan payment checkout", walletSubtitle:"WalletConnect Session",
    orderTitle:"FC Pay Sample Order", paidTitle:"Payment Completed", orderMeta:"Order ORD-20240620-001<br>Amount 12,000 JPYC",
    connect:"Connect HashPort Wallet", pay:"Pay with JPYC", openWallet:"Open HashPort Wallet", approve:"Approve & Sign", broadcast:"Broadcast JPYC Transfer", webhook:"Simulate Webhook",
    copied:"Tx information copied", noTx:"Tx has not been broadcast yet", paidBody:"Webhook confirmation is complete. FC Pay updated the order status to paid.", walletDone:"HashPort Wallet shows the payment as completed.", waitingWebhook:"Tx broadcast completed. Waiting for chain confirmation and Webhook.", processingTitle:"Processing on blockchain", processingBody:"Sending the JPYC Transfer to Avalanche. The demo advances after about 1.5 seconds.", processingLog:"Blockchain processing animation is shown for 1.5 seconds.",
    labels:{wallet:"Wallet",network:"Network",token:"Token",status:"Status",to:"To",gas:"Gas estimate",request:"Request",order:"Order",session:"Session",tx:"Tx Hash"},
    rows:{order:"Order",wallet:"Wallet",session:"Session",status:"Status",tx:"Tx Hash"},
    steps:[
      ["Open FC Pay","FC Pay App","The user opens FC Pay on the phone and sees an order waiting for payment.","User opens FC Pay checkout."],
      ["Connect HashPort Wallet and\nPay with JPYC","WalletConnect Session","The user taps connect. FC Pay calls HashPort Wallet and creates an Avalanche JPYC payment request at the same time.","FC Pay -> WalletConnect Session -> HashPort Wallet; pay with JPYC."],
      ["Review Payment in Wallet","HashPort Wallet","The phone switches to HashPort Wallet, where the user reviews amount, recipient, network, and gas estimate.","HashPort Wallet shows amount, recipient, network and gas estimate."],
      ["Sign in HashPort Wallet","User / Wallet","The user signs in HashPort Wallet and creates a broadcast-ready JPYC Transfer.","HashPort Wallet -> simulateWalletSignature(paymentRequest)."],
      ["Broadcast Tx","Avalanche","The signed JPYC Transfer is broadcast to Avalanche and receives a Tx Hash.",`JPYC Transfer broadcasted. Tx Hash: ${txHash}`],
      ["Webhook Confirmation","FC Pay Backend","The payment platform detects chain confirmation and notifies FC Pay by Webhook. The order becomes paid.","Webhook confirms payment. FC Pay order status becomes paid."]
    ]
  }
};

let current = 0, timer = null, lang = "ja", processingOnChain = false;
const els = {steps:document.getElementById("steps"),phoneApp:document.getElementById("phoneApp"),phoneAppName:document.getElementById("phoneAppName"),stageTitle:document.getElementById("stageTitle"),stageLead:document.getElementById("stageLead"),statusRows:document.getElementById("statusRows"),requestJson:document.getElementById("requestJson"),eventLog:document.getElementById("eventLog"),toast:document.getElementById("toast")};
function t(){return i18n[lang]}
function simulateWalletSignature(request){return `sig_hp_${request.requestId}_${Date.now().toString(36)}`}
function updatePaymentRequest(){paymentRequest.status=["draft","payment_request_created","wallet_reviewing","wallet_signed","tx_broadcasted","paid"][current];paymentRequest.fromWallet=current>=1?walletAddress:null;paymentRequest.walletConnectSession=current>=1?"wc:hashport-wallet-session-demo":null;paymentRequest.signedPayload=current>=3?paymentRequest.signedPayload||simulateWalletSignature(paymentRequest):null;paymentRequest.txHash=current>=4?txHash:null}
function kv(label,value){return `<div><span>${label}</span><b>${value}</b></div>`}
function fcPayApp(){const x=t(), connected=current>=1, requested=current>=1, paid=current>=5;return `<div class="app-card brand"><div class="mark">FC</div><div><h3>FC Pay</h3><p>${x.fcSubtitle}</p></div></div><div class="hero-ticket"><b>${paid?x.paidTitle:x.orderTitle}</b><span>${x.orderMeta}</span></div><div class="app-card kv">${kv(x.labels.wallet,connected?walletAddress:"Not connected")}${kv(x.labels.network,"Avalanche")}${kv(x.labels.token,"JPYC ERC-20")}${kv(x.labels.status,paymentRequest.status)}</div>${!connected?`<button class="phone-btn" onclick="tapConnectWallet()">${x.connect}</button>`:""}${connected&&!requested?`<button class="phone-btn" onclick="tapPayWithJPYC()">${x.pay}</button>`:""}${requested&&current<2?`<button class="phone-btn amber" onclick="tapOpenWallet()">${x.openWallet}</button>`:""}${paid?`<div class="app-card"><div class="amount">Paid</div><p class="toast-line">${x.paidBody}</p></div>`:""}`}
function hashPortWalletApp(){const x=t(), signed=current>=3, broadcasted=current>=4;if(processingOnChain){return `<div class="app-card wallet-top brand"><div class="wallet-logo"></div><div><h3>HashPort Wallet</h3><p>${x.walletSubtitle}</p></div></div><div class="app-card"><div class="amount">12,000 JPYC</div><div class="confirm-box kv">${kv(x.labels.to,merchantAddress)}${kv(x.labels.network,"Avalanche")}${kv(x.labels.gas,"0.0000x AVAX")}${kv(x.labels.request,paymentRequest.requestId)}</div></div><div class="app-card chainProcessing"><div class="chainProcessing-icon" aria-hidden="true"></div><h4>${x.processingTitle}</h4><p>${x.processingBody}</p><div class="processing-bar"><span></span></div></div>`}return `<div class="app-card wallet-top brand"><div class="wallet-logo"></div><div><h3>HashPort Wallet</h3><p>${x.walletSubtitle}</p></div></div><div class="app-card"><div class="amount">12,000 JPYC</div><div class="confirm-box kv">${kv(x.labels.to,merchantAddress)}${kv(x.labels.network,"Avalanche")}${kv(x.labels.gas,"0.0000x AVAX")}${kv(x.labels.request,paymentRequest.requestId)}</div></div>${!signed?`<button class="phone-btn green" onclick="tapWalletApprove()">${x.approve}</button>`:""}${signed&&!broadcasted?`<button class="phone-btn green" onclick="tapBroadcastTx()">${x.broadcast}</button>`:""}${broadcasted&&current<5?`<div class="app-card"><div class="loader"><span style="width:72%"></span></div><p class="toast-line">${x.waitingWebhook}</p></div><button class="phone-btn secondary" onclick="tapWebhookConfirm()">${x.webhook}</button>`:""}${current>=5?`<div class="app-card"><div class="amount">Done</div><p class="toast-line">${x.walletDone}</p></div>`:""}`}
function renderStaticText(){const x=t();document.documentElement.lang=lang;document.title=x.pageTitle;document.getElementById("heroTitle").innerHTML=x.heroTitle;document.getElementById("heroLead").textContent=x.heroLead;document.getElementById("stepsTitle").textContent=x.stepsTitle;document.getElementById("stepsLead").textContent=x.stepsLead;document.getElementById("pcTitle").textContent=x.pcTitle;document.getElementById("pcLead").textContent=x.pcLead;document.getElementById("logTitle").textContent=x.logTitle;document.getElementById("prevBtn").textContent=x.prev;document.getElementById("nextBtn").textContent=x.next;document.getElementById("resetBtn").textContent=x.reset;document.getElementById("autoBtn").textContent=timer?x.stop:x.auto;document.getElementById("copyTxBtn").textContent=x.copyTx;document.getElementById("openFcBtn").textContent=x.openFc;document.querySelectorAll("#languageToggle button").forEach(b=>b.classList.toggle("active",b.dataset.lang===lang))}
function renderSteps(){const x=t();els.steps.innerHTML=x.steps.map((step,index)=>`<button class="step" type="button" data-step="${index}"><span class="num">${index+1}</span><span><b>${step[0]}</b><span>${step[1]}</span></span></button>`).join("");document.querySelectorAll("[data-step]").forEach(button=>button.addEventListener("click",()=>setStep(Number(button.dataset.step),true)))}
function renderPhone(){els.phoneAppName.textContent=current>=2&&current<5?"HashPort Wallet":"FC Pay";els.phoneApp.innerHTML=current>=2&&current<5?hashPortWalletApp():fcPayApp()}
function renderPc(){const x=t();if(processingOnChain)paymentRequest.status="processing_on_chain";const rows=[[x.rows.order,paymentRequest.orderId],[x.rows.wallet,paymentRequest.fromWallet||"not_connected"],[x.rows.session,paymentRequest.walletConnectSession||"not_started"],[x.rows.status,paymentRequest.status],[x.rows.tx,paymentRequest.txHash||"not_broadcasted"]];els.statusRows.innerHTML=rows.map(([k,v])=>`<div class="row"><span>${k}</span><b>${v}</b></div>`).join("");els.requestJson.textContent=JSON.stringify(paymentRequest,null,2)}
function renderLog(){const lines=t().steps.slice(0,current+1).map((step,index)=>`[${index+1}] ${step[3]}`);if(processingOnChain)lines.push(`[${current+2}] ${t().processingLog}`);els.eventLog.textContent=lines.join("\n")}
function setStep(index,announce=false){processingOnChain=false;current=Math.max(0,Math.min(index,t().steps.length-1));updatePaymentRequest();renderStaticText();renderSteps();const step=t().steps[current];els.stageTitle.textContent=`${current+1}. ${step[0]}`;els.stageLead.textContent=step[2];renderPhone();renderPc();renderLog();document.querySelectorAll(".step").forEach((button,index)=>{button.classList.toggle("active",index===current);button.classList.toggle("done",index<current)});document.getElementById("prevBtn").disabled=current===0;document.getElementById("nextBtn").disabled=current===t().steps.length-1;if(announce)showToast(step[0])}
function setLanguage(nextLang){lang=nextLang;setStep(current,false)}
function showToast(text){els.toast.textContent=text;els.toast.classList.add("show");clearTimeout(showToast.timer);showToast.timer=setTimeout(()=>els.toast.classList.remove("show"),2200)}
function stopAuto(){if(timer){clearInterval(timer);timer=null;renderStaticText()}}
function tapConnectWallet(){stopAuto();setStep(1,true)}function tapPayWithJPYC(){stopAuto();setStep(1,true)}function tapOpenWallet(){stopAuto();setStep(2,true)}function tapWalletApprove(){stopAuto();setStep(3,true)}function tapBroadcastTx(){stopAuto();processingOnChain=true;updatePaymentRequest();renderStaticText();renderPhone();renderPc();renderLog();showToast(t().processingTitle);const processingOnChainDelay=1500;setTimeout(()=>{if(processingOnChain)setStep(4,true)},processingOnChainDelay)}function tapWebhookConfirm(){stopAuto();setStep(5,true)}
document.getElementById("prevBtn").addEventListener("click",()=>{stopAuto();setStep(current-1,true)});document.getElementById("nextBtn").addEventListener("click",()=>{stopAuto();setStep(current+1,true)});document.getElementById("resetBtn").addEventListener("click",()=>{stopAuto();paymentRequest.signedPayload=null;setStep(0,true)});document.getElementById("openFcBtn").addEventListener("click",()=>{stopAuto();setStep(current>=5?5:Math.min(current,1),true)});document.getElementById("copyTxBtn").addEventListener("click",async()=>{const value=paymentRequest.txHash||t().noTx;try{await navigator.clipboard.writeText(value);showToast(t().copied)}catch(error){showToast(value)}});document.getElementById("autoBtn").addEventListener("click",()=>{if(timer){stopAuto();return}timer=setInterval(()=>{if(current>=t().steps.length-1){stopAuto();return}setStep(current+1,false)},1200);renderStaticText()});document.querySelectorAll("#languageToggle button").forEach(button=>button.addEventListener("click",()=>setLanguage(button.dataset.lang)));
setStep(0);
</script>
</body>
</html>
