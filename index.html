<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Work Pages Index</title>
<style>
*{box-sizing:border-box}
:root{
  --navy:#071735;
  --ink:#17243b;
  --muted:#65758f;
  --blue:#0b5bc7;
  --cyan:#08a9e8;
  --green:#12884e;
  --line:#c8d8ea;
  --surface:#fff;
  --soft:#f5f9fd;
  --shadow:0 18px 42px rgba(15,37,75,.13);
}
html,body{min-height:100%}
body{
  margin:0;
  color:var(--ink);
  background:linear-gradient(180deg,#f8fbff 0%,#edf4fb 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Meiryo",Arial,sans-serif;
}
a{color:inherit}
.top{
  padding:34px 28px 22px;
  border-bottom:1px solid #dce7f4;
  background:rgba(255,255,255,.76);
}
.top-inner{
  max-width:1180px;
  margin:0 auto;
  display:grid;
  grid-template-columns:1fr auto;
  gap:24px;
  align-items:end;
}
h1{
  margin:0;
  color:var(--navy);
  font-size:clamp(32px,5vw,62px);
  line-height:1;
  letter-spacing:0;
}
.lead{
  margin:12px 0 0;
  max-width:760px;
  color:#263f66;
  font-size:15px;
  font-weight:800;
  line-height:1.55;
}
.meta{
  display:grid;
  gap:8px;
  justify-items:end;
  font-size:12px;
  font-weight:900;
  color:#334b69;
}
.pill{
  border:1px solid var(--line);
  background:#fff;
  border-radius:8px;
  padding:7px 10px;
}
.wrap{
  max-width:1180px;
  margin:0 auto;
  padding:22px 20px 34px;
}
.toolbar{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
  justify-content:space-between;
  margin-bottom:16px;
}
.status{
  color:var(--muted);
  font-size:13px;
  font-weight:800;
}
.actions{display:flex;gap:8px;flex-wrap:wrap}
.button{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:38px;
  padding:0 12px;
  border-radius:8px;
  border:1px solid #9dbce6;
  background:#fff;
  color:#153f79;
  font-size:13px;
  font-weight:900;
  text-decoration:none;
}
.button.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(290px,1fr));
  gap:16px;
}
.card{
  background:rgba(255,255,255,.94);
  border:1px solid var(--line);
  border-radius:8px;
  box-shadow:var(--shadow);
  overflow:hidden;
  display:grid;
  grid-template-rows:auto 1fr auto;
}
.preview{
  position:relative;
  height:220px;
  background:#e8f0f8;
  border-bottom:1px solid var(--line);
  overflow:hidden;
}
.preview iframe{
  width:1440px;
  height:960px;
  border:0;
  transform:scale(.215);
  transform-origin:top left;
  pointer-events:none;
  background:#fff;
}
.preview-fallback{
  position:absolute;
  inset:0;
  display:grid;
  place-items:center;
  color:#18385f;
  font-weight:900;
  background:linear-gradient(135deg,#eaf4ff,#fff);
}
.card-body{padding:14px}
.card h2{
  margin:0;
  color:var(--navy);
  font-size:18px;
  line-height:1.25;
}
.path{
  margin:6px 0 0;
  color:var(--muted);
  font-size:12px;
  font-weight:900;
  overflow-wrap:anywhere;
}
.card-actions{
  display:flex;
  gap:8px;
  padding:0 14px 14px;
}
.empty{
  border:1px dashed #aabbd0;
  background:rgba(255,255,255,.65);
  border-radius:8px;
  padding:22px;
  color:var(--muted);
  font-weight:800;
  line-height:1.55;
}
.error{
  margin-bottom:14px;
  border:1px solid #f0c0c0;
  background:#fff6f6;
  color:#8e2d2d;
  border-radius:8px;
  padding:12px 14px;
  font-size:13px;
  font-weight:800;
  line-height:1.5;
}
@media(max-width:760px){
  .top{padding:26px 16px 18px}
  .top-inner{grid-template-columns:1fr}
  .meta{justify-items:start}
  .wrap{padding:18px 12px 28px}
  .preview{height:190px}
  .preview iframe{transform:scale(.19)}
}
</style>
</head>
<body>
<header class="top">
  <div class="top-inner">
    <div>
      <h1>Work Pages Index</h1>
      <p class="lead">An automatically discovered index for GitHub Pages under <strong>zhviaze.github.io/work</strong>. Each subfolder with its own <code>index.html</code> appears here as a preview card.</p>
    </div>
    <div class="meta">
      <span class="pill">Repository: zhviaze/work</span>
      <span class="pill">Source: GitHub Contents API</span>
    </div>
  </div>
</header>

<main class="wrap">
  <div class="toolbar">
    <div class="status" id="status">Searching subfolders...</div>
    <div class="actions">
      <a class="button" href="https://github.com/zhviaze/work" target="_blank" rel="noopener">GitHub Repo</a>
      <button class="button primary" id="refreshButton" type="button">Refresh</button>
    </div>
  </div>
  <div id="errorBox"></div>
  <section class="grid" id="projectGrid" aria-live="polite"></section>
</main>

<script>
const OWNER = "zhviaze";
const REPO = "work";
const BRANCH = "main";
const BASE_PATH = location.pathname.startsWith("/work/") ? "/work/" : "/";
const API_ROOT = `https://api.github.com/repos/${OWNER}/${REPO}/contents`;
const FALLBACK_PROJECTS = [
  { name: "HIT_SC_PJ", path: "HIT_SC_PJ", title: "HIT_SC_PJ" },
  { name: "HIT_SC_PJ2", path: "HIT_SC_PJ2", title: "HIT_SC_PJ2" },
  { name: "fcpaydemo", path: "fcpaydemo", title: "FC Pay JPYC Payment Demo" },
];

const grid = document.getElementById("projectGrid");
const statusEl = document.getElementById("status");
const errorBox = document.getElementById("errorBox");
const refreshButton = document.getElementById("refreshButton");

function pageUrl(path) {
  return `${BASE_PATH}${encodeURIComponent(path)}/`;
}

function githubFolderUrl(path) {
  return `https://github.com/${OWNER}/${REPO}/tree/${BRANCH}/${encodeURIComponent(path)}`;
}

function cleanTitle(raw, fallback) {
  return (raw || fallback || "").replace(/\s+/g, " ").trim();
}

async function fetchJson(url) {
  const response = await fetch(url, { headers: { Accept: "application/vnd.github+json" } });
  if (!response.ok) {
    throw new Error(`${response.status} ${response.statusText}`);
  }
  return response.json();
}

async function getPageTitle(path) {
  try {
    const response = await fetch(pageUrl(path), { cache: "no-store" });
    if (!response.ok) return path;
    const html = await response.text();
    const match = html.match(/<title[^>]*>([\s\S]*?)<\/title>/i);
    return cleanTitle(match && match[1], path);
  } catch {
    return path;
  }
}

async function folderHasIndex(path) {
  const contents = await fetchJson(`${API_ROOT}/${encodeURIComponent(path)}?ref=${BRANCH}`);
  return Array.isArray(contents) && contents.some((item) => item.type === "file" && item.name.toLowerCase() === "index.html");
}

async function discoverProjects() {
  const rootContents = await fetchJson(`${API_ROOT}?ref=${BRANCH}`);
  const folders = rootContents
    .filter((item) => item.type === "dir")
    .map((item) => ({ name: item.name, path: item.path }));

  const checked = await Promise.all(folders.map(async (folder) => {
    try {
      const hasIndex = await folderHasIndex(folder.path);
      if (!hasIndex) return null;
      const title = await getPageTitle(folder.path);
      return { ...folder, title };
    } catch {
      return null;
    }
  }));

  return checked
    .filter(Boolean)
    .sort((a, b) => a.name.localeCompare(b.name));
}

function renderProjects(projects) {
  grid.innerHTML = "";

  if (!projects.length) {
    grid.innerHTML = `<div class="empty">No subfolder pages were found. Add an <code>index.html</code> inside a folder to make it appear here.</div>`;
    statusEl.textContent = "No pages found.";
    return;
  }

  const fragment = document.createDocumentFragment();
  for (const project of projects) {
    const card = document.createElement("article");
    card.className = "card";
    card.innerHTML = `
      <div class="preview">
        <iframe title="${project.title} preview" src="${pageUrl(project.path)}" loading="lazy"></iframe>
        <div class="preview-fallback">${project.name}</div>
      </div>
      <div class="card-body">
        <h2>${project.title}</h2>
        <p class="path">${project.path}/index.html</p>
      </div>
      <div class="card-actions">
        <a class="button primary" href="${pageUrl(project.path)}">Open page</a>
        <a class="button" href="${githubFolderUrl(project.path)}" target="_blank" rel="noopener">Source</a>
      </div>
    `;
    const iframe = card.querySelector("iframe");
    const fallback = card.querySelector(".preview-fallback");
    iframe.addEventListener("load", () => {
      fallback.style.display = "none";
    });
    fragment.append(card);
  }
  grid.append(fragment);
  statusEl.textContent = `${projects.length} page${projects.length === 1 ? "" : "s"} discovered.`;
}

function renderError(message) {
  errorBox.innerHTML = `<div class="error">${message}<br>Showing fallback projects bundled with this page.</div>`;
}

async function loadIndex() {
  errorBox.innerHTML = "";
  statusEl.textContent = "Searching subfolders...";
  refreshButton.disabled = true;
  try {
    const projects = await discoverProjects();
    renderProjects(projects);
  } catch (error) {
    renderError(`Could not query the GitHub Contents API: ${error.message}`);
    renderProjects(FALLBACK_PROJECTS);
  } finally {
    refreshButton.disabled = false;
  }
}

refreshButton.addEventListener("click", loadIndex);
loadIndex();
</script>
</body>
</html>
